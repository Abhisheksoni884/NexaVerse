# ── NOTE ───────────────────────────────────────────────────────────────────────
# Before building, ensure frontend is built to backend/static:
#   cd frontend && npm run build
# This bundles React assets into backend/static/ which are served by FastAPI
# ───────────────────────────────────────────────────────────────────────────────

services:
  # ── Backend: FastAPI ──────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: nexaverse-backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    environment:
      - APP_ENV=production
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

networks:
  default:
    name: nexaverse-network
